version: '3.8'

services:
  # Ollama for local LLM inference
  ollama:
    image: ollama/ollama:latest
    container_name: trading-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # Backend API using FastAPI
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: trading-api
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - TRADINGAGENTS_CACHE_DIR=/app/data/cache
      - TRADINGAGENTS_RESULTS_DIR=/app/data/results
    volumes:
      - .:/app
      - trading_data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
    restart: always

  # Frontend Dashboard
  frontend:
    image: nginx:alpine
    container_name: trading-frontend
    volumes:
      - ./frontend:/usr/share/nginx/html
    ports:
      - "3001:80"
    depends_on:
      - api
    restart: always

volumes:
  ollama_data:
  trading_data:
