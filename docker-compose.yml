version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: trading-mongodb-local
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_local:/data/db
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: trading-api-local
    environment:
      - MONGO_URI=mongodb://mongodb:27017/tradingagents
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    restart: always

  frontend:
    build:
      context: ./frontend
    container_name: trading-frontend-local
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: always

volumes:
  mongo_data_local:
